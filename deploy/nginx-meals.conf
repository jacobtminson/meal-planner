# Swipe app + API  →  meals.yourdomain.com
server {
    listen 80;
    server_name meals.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name meals.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/meals.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meals.yourdomain.com/privkey.pem;

    # Swipe UI — single HTML file
    root /opt/meals/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # FastAPI — proxied under /api/
    location /api/ {
        proxy_pass         http://127.0.0.1:8765/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Mealie media (images) — proxied internally so browser can load them
    location /mealie-media/ {
        proxy_pass         http://127.0.0.1:9000/api/media/;
        proxy_set_header   Host $host;
        proxy_cache_valid  200 7d;
    }
}

# Mealie UI  →  recipes.yourdomain.com
server {
    listen 80;
    server_name recipes.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name recipes.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/recipes.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/recipes.yourdomain.com/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:9000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }
}
